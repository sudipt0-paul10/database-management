<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(120deg,#667eea,#764ba2);
min-height:100vh;
}

.login-wrapper{
margin-top:120px;
}

.login-card{
max-width:520px;
margin:auto;
border:none;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.login-title{
font-weight:600;
}

.form-control{
padding:12px;
border-radius:8px;
}

.btn-login{
padding:10px;
border-radius:8px;
font-weight:500;
}

</style>

</head>

<body>

{% include 'navbar.html' %}

<div class="container login-wrapper">

<div class="card login-card p-4">

<h3 class="text-center login-title mb-4">User Login</h3>

<form method="post">

<input 
class="form-control mb-3"
name="username"
placeholder="Username"
required>

<input 
type="password"
class="form-control mb-3"
name="password"
placeholder="Password"
required>

<button class="btn btn-primary w-100 btn-login">
Login
</button>

</form>

<p class="mt-3 text-center">
New user? <a href="/signup">Signup</a>
</p>

<hr>

<p class="text-center">
Admin? 
<a href="/admin" class="btn btn-warning btn-sm">
Admin Login
</a>
</p>

</div>

</div>

</body>
</html>
